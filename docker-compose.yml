services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: admin-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: admin_system
      MYSQL_ROOT_HOST: '%'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - admin-network
    healthcheck:
      test: ["CMD", "mysql", "-uroot", "-proot123", "-e", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: admin-backend
    restart: always
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - admin-network

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: admin-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - admin-network

volumes:
  mysql_data:
  uploads_data:

networks:
  admin-network:
    driver: bridge
